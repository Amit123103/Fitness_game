version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: warrior-db
    restart: always
    environment:
      POSTGRES_USER: warrior_user
      POSTGRES_PASSWORD: warrior_password
      POSTGRES_DB: warrior_game
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: warrior-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgresql://warrior_user:warrior_password@db:5432/warrior_game?schema=public
      - JWT_SECRET=your_super_secret_jwt_key_here
      - PORT=5000
    depends_on:
      - db
    command: sh -c "npx prisma db push && npm start"

volumes:
  pgdata:
